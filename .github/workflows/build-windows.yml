name: Build Windows Agent

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller psutil pillow

    - name: Build executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "AgentKu-Windows" "agentku-windows.py"

    - name: Commit and Push executable
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add dist/AgentKu-Windows.exe
        git commit -m "Auto-build Windows agent executable"
        git push
