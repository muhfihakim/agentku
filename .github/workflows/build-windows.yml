name: Build Windows Agent

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller psutil pillow

    - name: Build executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "agentku-windows" "agentku-windows.py"

    - name: Commit and Push executable
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-build Windows agent executable"
        file_pattern: "dist/agentku-windows.exe"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: agentku-windows-exe
        path: dist/agentku-windows.exe
